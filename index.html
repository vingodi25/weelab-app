<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">WeeLAB · Thực đơn cho làn da</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f2f5f0;            /* Baby Powder */
    --card:#ffffff;
    --ink:#0d171c;           /* Rich Black */
    --muted:#6f8a8f;
    --line:#dde6e3;
    --brand:#568791;         /* Wee Blue */
    --brand-dark:#2a4c5e;    /* Charcoal */
    --brand-soft:#e3edec;    /* tint của Ash Gray */
    --green:#5b8a72;
    --green-soft:#e6f0ea;
    --gold:#bfa15a;
    --danger:#a31420;        /* Madder */
    --danger-soft:#f3dde0;   /* Madder nhạt cho nền active/selected */
    --danger-soft2:#fbeef0;  /* Madder rất nhạt cho nền badge/mã món */
    --shadow:0 2px 10px rgba(13,23,28,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:auto;}
  body{
    font-family:"Montserrat",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;font-size:15px;
  }
  header.top{
    background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);
    color:#fff;padding:18px 24px;display:flex;align-items:center;gap:14px;
  }
  header.top .logo{
    width:auto;height:34px;
    display:flex;align-items:center;justify-content:center;
    flex:none;overflow:hidden;
  }
  header.top .logo img{height:100%;width:auto;object-fit:contain;display:block;}
  header.top .htext{flex:1;min-width:0;}
  header.top h1{margin:0;font-size:19px;font-weight:700;}
  header.top p{margin:0;font-size:12.5px;opacity:.85;}
  .langsw{display:flex;gap:4px;flex:none;background:rgba(255,255,255,.16);border-radius:10px;padding:3px;}
  .langsw button{border:none;background:transparent;color:#fff;opacity:.7;font-size:12.5px;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .langsw button.on{background:#fff;color:var(--brand-dark);opacity:1;}
  .wrap{max-width:1180px;margin:0 auto;padding:22px;}
  .grid{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start;}
  @media(max-width:980px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
  .card h2{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px;}
  .card .sub{color:var(--muted);font-size:12.5px;margin-bottom:16px;}
  .step-num{background:var(--brand);color:#fff;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  label.fld{display:block;font-size:13px;font-weight:600;margin:12px 0 5px;}
  input[type=text],input[type=tel],input[type=email],textarea,select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fcfaf7;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);}
  textarea{resize:vertical;min-height:64px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:560px){.row2{grid-template-columns:1fr;}}
  .returning{background:var(--green-soft);border:1px solid #cfe3d7;border-radius:10px;padding:10px 12px;font-size:13px;margin-top:8px;display:none;}
  .returning b{color:var(--green);}

  /* customer type toggle */
  .ctypes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 0;}
  .ctype{border:2px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;text-align:center;transition:.12s;background:#fcfaf7;font-size:13px;font-weight:600;}
  .ctype.on{border-color:var(--danger);background:var(--danger-soft);color:var(--danger);}

  /* skin tags */
  .skintags{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .skintag{border:1px solid var(--line);background:#fcfaf7;border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;user-select:none;transition:.12s;}
  .skintag:hover{border-color:var(--danger);}
  .skintag.on{background:var(--danger);color:#fff;border-color:var(--danger);}

  /* mode toggle */
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
  .mode{border:2px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;text-align:center;transition:.12s;background:#fcfaf7;}
  .mode.on{border-color:var(--danger);background:var(--danger-soft);}
  .mode .t{font-weight:700;font-size:14px;}
  .mode .d{font-size:11.5px;color:var(--muted);}
  .buffetpicks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
  .bpack{border:2px solid var(--line);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;font-size:12.5px;background:#fff;transition:.12s;}
  .bpack.on{border-color:var(--gold);background:#faf4e3;}
  .bpack .nm{font-weight:700;font-size:13px;}
  .bpack .pr{color:var(--brand-dark);font-weight:700;margin-top:3px;}
  .bpack .inc{color:var(--muted);font-size:10.5px;margin-top:3px;line-height:1.3;}

  /* menu */
  .grouphd{font-weight:700;font-size:13.5px;margin:18px 0 6px;color:var(--brand-dark);display:flex;justify-content:space-between;align-items:center;}
  .grouphd .note{font-weight:500;color:var(--muted);font-size:11.5px;}
  .grouphd.locked{opacity:.4;}
  .item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;background:#fff;transition:.12s;}
  .item.rec{border-color:var(--green);background:var(--green-soft);}
  .item.contra{border-color:var(--danger);background:#fbece8;}
  .item .contrabadge{display:inline-block;background:var(--danger);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle;}
  .item.disabled{opacity:.4;pointer-events:none;background:#f3efe9;}
  .item input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--brand);cursor:pointer;flex:none;}
  .item .body{flex:1;min-width:0;}
  .item .nm{font-size:13.5px;font-weight:600;}
  .item .meta{font-size:11.5px;color:var(--muted);}
  .item .code{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:var(--brand-dark);border-radius:5px;padding:1px 6px;margin-right:6px;letter-spacing:.3px;vertical-align:middle;}
  .item .recbadge{display:inline-block;background:var(--green);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle;}
  .item .price{text-align:right;font-size:12.5px;font-weight:700;white-space:nowrap;}
  .item .price .strike{text-decoration:line-through;color:var(--muted);font-weight:500;font-size:11.5px;display:block;}
  .item .pricetbl{display:flex;gap:10px;align-items:center;}
  .item .pricecol{display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 9px;border-radius:7px;min-width:64px;}
  .item .pricecol .ptag{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
  .item .pricecol .pval{font-weight:700;font-size:12.5px;color:var(--muted);}
  .item .pricecol.active{background:var(--danger-soft2);}
  .item .pricecol.active .ptag{color:var(--danger);}
  .item .pricecol.active .pval{color:var(--danger);}
  .item .pricecol.single{min-width:auto;background:none;padding:3px 0;}
  .item .pricecol.single .pval{color:var(--ink);}
  .item .pricecol.single .ptag{color:var(--muted);}

  /* summary */
  .sumcard{position:-webkit-sticky;position:sticky;top:18px;align-self:start;}
  .billline{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line);gap:8px;}
  .billline .bn{flex:1;}
  .billline .bp{font-weight:600;white-space:nowrap;}
  .billline.struck .bp{text-decoration:line-through;color:var(--muted);font-weight:500;}
  .timeline{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0 0;color:var(--muted);font-weight:600;}
  .timeline .tv{color:var(--ink);font-weight:700;}
  .total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-top:12px;padding-top:12px;border-top:2px solid var(--ink);}
  .total .amt{color:var(--brand-dark);}
  .saving{font-size:12px;color:var(--green);text-align:right;margin-top:4px;}
  .warn{background:#fbece8;border:1px solid #f0c9bf;color:var(--danger);border-radius:10px;padding:9px 11px;font-size:12.5px;margin-top:10px;display:none;}
  .btn{display:block;width:100%;border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit;}
  .btn.primary{background:var(--brand);color:#fff;}
  .btn.primary:hover{background:var(--brand-dark);}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:hover{border-color:var(--brand);}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:18px 0;}
  .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--brand-soft);color:var(--brand-dark);font-weight:600;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
  /* print */
  @media print{
    header.top,.no-print{display:none!important;}
    .grid{grid-template-columns:1fr;}
    body{background:#fff;}
    .card{box-shadow:none;border:none;}
  }
</style>
</head>

  <div class="htext">
    <h1 id="hTitle">THỰC ĐƠN CHO LÀN DA</h1>
    <p id="hSub">Mời bạn chọn món cho da nha</p>
  </div>
  <div class="langsw no-print">
    <button id="langVi" onclick="setLang('vi')">VI</button>
    <button id="langEn" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="wrap">
<div class="grid">

  <!-- LEFT -->
  <div>
    <!-- STEP 1: KHÁCH -->
    <div class="card">
      <h2><span class="step-num">1</span> <span id="t_step1Title"></span></h2>
      <div class="sub" id="t_step1Sub"></div>
      <div class="row2">
        <div>
          <label class="fld" id="t_lblName"></label>
          <input type="text" id="cName" placeholder="VD: Nguyễn Thị A">
        </div>
        <div>
          <label class="fld" id="t_lblPhone"></label>
          <input type="tel" id="cPhone" placeholder="VD: 0901234567">
        </div>
      </div>
      <label class="fld" id="t_lblEmail"></label>
      <input type="email" id="cEmail" placeholder="VD: a@gmail.com">

      <label class="fld" id="t_lblCtype"></label>
      <div class="ctypes">
        <div class="ctype on" id="ctypeRetail" onclick="setCustomerType('retail')">🧍 <span id="t_retail"></span></div>
        <div class="ctype" id="ctypeMember" onclick="setCustomerType('member')">⭐ <span id="t_member"></span></div>
      </div>

      <div class="returning" id="returningBox"></div>
    </div>

    <!-- STEP 2: TÌNH TRẠNG DA -->
    <div class="card">
      <h2><span class="step-num">2</span> <span id="t_step2Title"></span></h2>
      <div class="sub" id="t_step2Sub"></div>
      <div class="skintags" id="skinTags"></div>
      <label class="fld" id="t_lblNote"></label>
      <textarea id="cNote" placeholder="VD: da đang kích ứng vùng má, tránh peel mạnh; khách nhạy cảm với mùi..."></textarea>
    </div>

    <!-- STEP 3: HÌNH THỨC -->
    <div class="card">
      <h2><span class="step-num">3</span> <span id="t_step3Title"></span></h2>
      <div class="sub" id="t_step3Sub"></div>
      <div class="modes">
        <div class="mode on" id="modeALC" onclick="setMode('alc')">
          <div class="t">🍽️ <span id="t_modeAlcT"></span></div>
          <div class="d" id="t_modeAlcD"></div>
        </div>
        <div class="mode" id="modeBUF" onclick="setMode('buf')">
          <div class="t">🥗 <span id="t_modeBufT"></span></div>
          <div class="d" id="t_modeBufD"></div>
        </div>
      </div>
      <div id="buffetPacks" style="display:none;">
        <div class="buffetpicks" id="bpacks"></div>
        <div class="hint" id="t_buffetHint"></div>
      </div>

      <div id="menuArea"></div>
    </div>
  </div>

  <!-- RIGHT: BILL -->
  <div>
    <div class="card sumcard">
      <h2>🧾 <span id="t_billTitle"></span></h2>
      <div class="sub" id="billCustomer">—</div>
      <div id="billLines"><div class="empty" id="t_billEmpty"></div></div>
      <div class="timeline" id="timeLine" style="display:none;"><span>⏱ <span id="t_totalTimeLbl"></span></span><span class="tv" id="totalTime">0</span></div>
      <div class="total"><span id="t_grandTotalLbl"></span><span class="amt" id="grandTotal">0 đ</span></div>
      <div class="saving" id="savingNote"></div>
      <div class="warn" id="buffetWarn"></div>
      <div class="warn" id="contraWarn"></div>
      <div class="no-print" id="sheetUrlBox" style="display:none;margin-top:10px;">
        <label class="fld"><span id="t_sheetUrlLbl"></span> <span style="font-weight:400;color:var(--muted);" id="t_sheetUrlHint"></span></label>
        <input type="text" id="sheetUrl" placeholder="https://script.google.com/macros/s/XXXXX/exec">
        <button class="btn ghost" style="margin-top:6px;" onclick="saveSheetUrl()" id="t_btnSaveUrl"></button>
      </div>
      <div class="no-print">
        <button class="btn primary" id="btnSaveSheet" onclick="saveAndExport()">💾 <span id="t_btnSave"></span></button>
        <button class="btn ghost" onclick="window.print()">🖨️ <span id="t_btnPrint"></span></button>
        <button class="btn ghost" onclick="resetAll()">↺ <span id="t_btnReset"></span></button>
        <button class="btn ghost" onclick="toggleSheetUrlBox()" style="font-size:12px;">⚙️ <span id="t_btnCfg"></span></button>
      </div>
    </div>
  </div>

</div>
</div>

/* ============ RENDER: skin tags ============ */
function renderSkins(){
  const box=document.getElementById("skinTags");
  box.innerHTML="";
  Object.keys(SKIN_MAP).forEach(s=>{
    const el=document.createElement("div");
    el.className="skintag"+(state.skins.includes(s)?" on":"");
    el.textContent=skinLabel(s);
    el.onclick=()=>{
      if(state.skins.includes(s)) state.skins=state.skins.filter(x=>x!==s);
      else state.skins.push(s);
      renderSkins(); renderMenu(); renderBill();
    };
    box.appendChild(el);
  });
}
function contraIds(){
  const set=new Set();
  state.skins.forEach(s=>(CONTRA_MAP[s]||[]).forEach(id=>set.add(id)));
  return set;
}
function recommendedIds(){
  const set=new Set();
  state.skins.forEach(s=>(SKIN_MAP[s]||[]).forEach(id=>set.add(id)));
  // ưu tiên chống chỉ định: nếu món vừa gợi ý vừa contra → bỏ khỏi gợi ý
  contraIds().forEach(id=>set.delete(id));
  return set;
}

  document.getElementById("buffetPacks").style.display = m==="buf"?"block":"none";
  if(m==="alc"){ state.buffet=null; }
  renderBuffetPacks(); renderMenu(); renderBill();
}
function renderBuffetPacks(){
  const box=document.getElementById("bpacks");
  box.innerHTML="";
  BUFFET.forEach(b=>{
    const el=document.createElement("div");
    el.className="bpack"+(state.buffet===b.id?" on":"");
    el.innerHTML=`<div class="nm">${bName(b)}</div><div class="pr">${fmt(b.price)}</div><div class="inc">${bInc(b)}</div>`;
    el.onclick=()=>{
      state.buffet = state.buffet===b.id ? null : b.id;
      // bỏ tick các món ngoài nhóm cho phép
      if(state.buffet){
        const allow=BUFFET.find(x=>x.id===state.buffet).groups;
        [...state.selected].forEach(id=>{ if(!allow.includes(byId(id).group)) state.selected.delete(id); });
      }
      renderBuffetPacks(); renderMenu(); renderBill();
    };
    box.appendChild(el);
  });
}
function allowedGroups(){
  if(state.mode==="buf" && state.buffet) return BUFFET.find(b=>b.id===state.buffet).groups;
  return null; // null = tất cả cho phép (gọi lẻ)
}

/* ============ RENDER: menu ============ */
function renderMenu(){
  const area=document.getElementById("menuArea");
  area.innerHTML="";
  const rec=recommendedIds();
  const contra=contraIds();
  const allow=allowedGroups();
  GROUPS.forEach(g=>{
    const items=MENU.filter(m=>m.group===g.key);
    const groupLocked = allow && !allow.includes(g.key);
    const hd=document.createElement("div");
    hd.className="grouphd"+(groupLocked?" locked":"");
    hd.innerHTML=`<span>${gTitle(g)}</span><span class="note">${groupLocked?tr("notInBuffet"):(gNote(g)||"")}</span>`;
    area.appendChild(hd);
    items.forEach(m=>{
      const isContra=contra.has(m.id);
      const isRec=rec.has(m.id) && !isContra; // contra đã loại khỏi rec, nhưng chắc chắn
      const checked=state.selected.has(m.id);
      const showStrike = state.mode==="buf" && state.buffet && !groupLocked; // buffet: gạch giá lẻ
      const it=document.createElement("div");
      it.className="item"+(isRec&&!groupLocked?" rec":"")+(isContra&&!groupLocked?" contra":"")+(groupLocked?" disabled":"");
      let badge="";
      if(isContra&&!groupLocked) badge=`<span class="contrabadge">${tr("contraBadge")}</span>`;
      else if(isRec&&!groupLocked) badge=`<span class="recbadge">${tr("recBadge")}</span>`;
      const samePrice = m.member==null || m.member===m.list; // PT1/PT2 (member null→fallback list) hoặc giá lẻ=member → gộp 1 ô
      const priceBlock = showStrike
        ? `<span class="strike">${fmt(priceFor(m))}</span>${tr("inBundle")}`
        : samePrice
          ? `<div class="pricetbl"><div class="pricecol single"><span class="ptag">${tr("pricetag_both")}</span><span class="pval">${fmt(m.list)}</span></div></div>`
          : `<div class="pricetbl">
               <div class="pricecol${state.customerType==="retail"?" active":""}"><span class="ptag">${tr("pricetag_retail")}</span><span class="pval">${fmt(m.list)}</span></div>
               <div class="pricecol${state.customerType==="member"?" active":""}"><span class="ptag">${tr("pricetag_member")}</span><span class="pval">${fmt(m.member)}</span></div>
             </div>`;
      it.innerHTML=`
        <input type="checkbox" ${checked?"checked":""} ${groupLocked?"disabled":""} data-id="${m.id}">
        <div class="body">
          <div class="nm"><span class="code">${m.id}</span>${mName(m)}${badge}</div>
          <div class="meta">${mDesc(m)}</div>
        </div>
        <div class="price">${priceBlock}</div>`;
      const cb=it.querySelector("input");
      cb.onchange=()=>{
        if(cb.checked && isContra){
          const skinList=state.skins.filter(s=>(CONTRA_MAP[s]||[]).includes(m.id)).map(skinLabel).join(", ");
          if(!confirm(tr("confirmContra")(mName(m),skinList))){
            cb.checked=false; return;
          }
        }
        cb.checked?state.selected.add(m.id):state.selected.delete(m.id);
        renderMenu(); renderBill();
      };
      area.appendChild(it);
    });
  });
}

/* ============ RENDER: bill ============ */
function billItems(){
  return [...state.selected].map(byId).filter(Boolean);
}
function alcTotal(){ // tổng tính theo giá chuẩn của loại khách hiện tại (lẻ hoặc member)
  return billItems().reduce((s,m)=>s+priceFor(m),0);
}
function totalTimeMins(){
  // tổng thời gian = cộng thời gian các món đã tick (áp dụng cho cả gọi lẻ và buffet)
  return billItems().reduce((s,m)=>s+(m.time||0),0);
}
function renderBill(){
  // khách
  const name=document.getElementById("cName").value.trim();
  const phone=document.getElementById("cPhone").value.trim();
  const typeLabel = (state.customerType==="member" ? "⭐ " : "🧍 ") + tr(state.customerType==="member"?"member":"retail");
  document.getElementById("billCustomer").textContent =
    (name||phone) ? `${name||tr("noName")}${phone?" · "+phone:""} · ${typeLabel}` : `${tr("noCustomer")} · ${typeLabel}`;

  const lines=document.getElementById("billLines");
  const items=billItems();
  const isBuf = state.mode==="buf" && state.buffet;
  const buf = isBuf ? BUFFET.find(b=>b.id===state.buffet) : null;

  const timeBox=document.getElementById("timeLine");
  const tMins=totalTimeMins();
  if(tMins>0){
    document.getElementById("totalTime").textContent=fmtTime(tMins);
    timeBox.style.display="flex";
  }else{
    timeBox.style.display="none";
  }

  if(items.length===0 && !isBuf){
    lines.innerHTML=`<div class="empty">${tr("billEmpty")}</div>`;
    document.getElementById("grandTotal").textContent=fmt(0);
    document.getElementById("savingNote").textContent="";
    document.getElementById("buffetWarn").style.display="none";
    return;
  }

  let html="";
  items.forEach(m=>{
    const price=priceFor(m);
    html+=`<div class="billline ${isBuf?"struck":""}"><span class="bn">${mName(m)}</span><span class="bp">${fmt(price)}</span></div>`;
  });

  let grand, saving="", warn="";
  if(isBuf){
    html+=`<div class="billline"><span class="bn"><b>${tr("bundleLabel")} ${bName(buf)}</b></span><span class="bp">${fmt(buf.price)}</span></div>`;
    grand=buf.price;
    const alc=alcTotal();
    if(alc>0){
      if(alc>buf.price){
        saving=tr("savingMsg")(fmt(alc-buf.price));
      }else if(alc<buf.price){
        warn=tr("warnBufLow")(fmt(alc),fmt(buf.price));
      }
    }
  }else{
    grand=alcTotal();
  }
  lines.innerHTML=html;
  document.getElementById("grandTotal").textContent=fmt(grand);
  document.getElementById("savingNote").textContent=saving;
  const w=document.getElementById("buffetWarn");
  if(warn){ w.textContent=warn; w.style.display="block"; } else { w.style.display="none"; }

  // cảnh báo chống chỉ định cho các món đã chọn
  const contra=contraIds();
  const picked=items.filter(m=>contra.has(m.id)).map(mName);
  const cw=document.getElementById("contraWarn");
  if(picked.length){
    cw.innerHTML=tr("contraWarn")(picked.join(", "));
    cw.style.display="block";
  }else{ cw.style.display="none"; }
}

/* ============ KHÁCH CŨ (localStorage) ============ */
const DB_KEY="weelab_customers";
function loadDB(){ try{return JSON.parse(localStorage.getItem(DB_KEY))||{};}catch(e){return {};} }
function saveDB(db){ localStorage.setItem(DB_KEY,JSON.stringify(db)); }

function renderReturningBox(rec){
  const box=document.getElementById("returningBox");
  if(!rec){ box.style.display="none"; return; }
  document.getElementById("cName").value = document.getElementById("cName").value || rec.name||"";
  document.getElementById("cEmail").value = document.getElementById("cEmail").value || rec.email||"";
  const last=rec.visits&&rec.visits.length?rec.visits[rec.visits.length-1]:null;
  let h=`<b>${tr("returningTitle")}</b> — ${tr("returningVisits")(rec.visits?rec.visits.length:0)}`;
  if(last){
    const modeStr = last.mode==="buf" ? tr("buf")(last.buffetName) : tr("alc");
    const skinsStr = (last.skins||[]).map(skinLabel).join(", ")||"—";
    h+=`<br>${tr("returningLast")(last.date, skinsStr, modeStr, fmt(last.total))}`;
    if(last.note) h+=`<br>${tr("returningNote")(last.note)}`;
  }
  box.innerHTML=h; box.style.display="block";
}

// Tra cứu qua JSONP (script tag) — cách ổn định nhất để GET dữ liệu từ Apps Script
// Web App mà không bị chặn bởi CORS (Apps Script không luôn trả Access-Control-Allow-Origin
// cho fetch() thường, nhưng JSONP không bị giới hạn CORS vì dùng <script src=...>).
function jsonpRequest(url, params, timeoutMs){
  return new Promise((resolve,reject)=>{
    const cbName="weelabCb_"+Date.now()+"_"+Math.floor(Math.random()*1e6);
    const qs=Object.keys(params).map(k=>encodeURIComponent(k)+"="+encodeURIComponent(params[k])).join("&");
    const script=document.createElement("script");
    let done=false;
    function cleanup(){
      done=true;
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    }
    window[cbName]=function(data){
      if(done) return;
      cleanup();
      resolve(data);
    };
    const timer=setTimeout(()=>{
      if(done) return;
      cleanup();
      reject(new Error("timeout"));
    }, timeoutMs||8000);
    script.onerror=function(){
      if(done) return;
      cleanup();
      reject(new Error("script load error"));
    };
    script.src=url+(url.includes("?")?"&":"?")+qs+"&callback="+cbName;
    document.head.appendChild(script);
  });
}

let _checkReturningSeq=0;
async function checkReturning(){
  const phone=document.getElementById("cPhone").value.trim();
  const box=document.getElementById("returningBox");
  if(phone.length<8){ box.style.display="none"; renderBill(); return; }

  const mySeq=++_checkReturningSeq;
  const db=loadDB();
  const localRec=db[phone];

  // Hiện ngay dữ liệu cục bộ (nếu có) để không bị giật khi đang chờ mạng
  renderReturningBox(localRec);
  renderBill();

  const url=getSheetUrl();
  if(!url) return; // chưa cấu hình Sheet thì chỉ dùng dữ liệu máy này

  try{
    const data=await jsonpRequest(url, {phone:phone});
    if(mySeq!==_checkReturningSeq) return; // người dùng đã gõ số khác, bỏ kết quả cũ
    if(data && data.ok && data.found){
      const remoteRec={name:data.name||"", email:data.email||"", visits:data.visits||[]};
      // đồng bộ ngược lại vào localStorage làm cache cho máy này
      db[phone]=remoteRec;
      saveDB(db);
      renderReturningBox(remoteRec);
    } else if(data && data.ok && !data.found && !localRec){
      box.style.display="none";
    }
  }catch(err){
    // Mất mạng hoặc lỗi — vẫn giữ dữ liệu cục bộ đã hiện ở trên, không báo lỗi gây phiền
    console.warn("Không tra được khách quen từ Google Sheet:", err);
  }
}

/* ============ LƯU + XUẤT ============ */
function currentRecord(){
  const items=billItems();
  const isBuf=state.mode==="buf"&&state.buffet;
  const buf=isBuf?BUFFET.find(b=>b.id===state.buffet):null;
  const total=isBuf?buf.price:alcTotal();
  return {
    name:document.getElementById("cName").value.trim(),
    phone:document.getElementById("cPhone").value.trim(),
    email:document.getElementById("cEmail").value.trim(),
    customerType:state.customerType,
    skins:[...state.skins],
    note:document.getElementById("cNote").value.trim(),
    mode:isBuf?"buf":"alc",
    buffetName:buf?buf.name:"",
    items:items.map(m=>({id:m.id,name:m.name,price:priceFor(m),contra:contraIds().has(m.id)})),
    contraPicked:items.filter(m=>contraIds().has(m.id)).map(m=>m.name),
    alcTotal:alcTotal(),
    totalTimeMins:totalTimeMins(),
    total,
    date:new Date().toLocaleString("vi-VN"),
  };
}
/* ============ GOOGLE SHEET (Web App URL) ============ */
const SHEET_URL_KEY="weelab_sheet_url";
// URL Apps Script mặc định gắn sẵn — để mọi máy/iPad mở app đều có sẵn cấu hình,
// không phải dán lại mỗi khi Safari xoá localStorage (Private mode, ITP, đóng app lâu ngày...).
// Nếu sau này deploy lại Apps Script ra URL mới, đổi giá trị này rồi cập nhật lại file là đủ,
// không cần yêu cầu nhân sự cấu hình lại trên từng máy.
const DEFAULT_SHEET_URL="https://script.google.com/macros/s/AKfycbwXAz_MPUTgkLZsbkU3kdZHacRv920Xr306Ubbx5_xRRR8CdWFWxLPqfNTvlPf-o2AX/exec";
function getSheetUrl(){ return localStorage.getItem(SHEET_URL_KEY)||DEFAULT_SHEET_URL; }
function toggleSheetUrlBox(){
  const box=document.getElementById("sheetUrlBox");
  const show = box.style.display==="none";
  box.style.display = show ? "block":"none";
  if(show) document.getElementById("sheetUrl").value=getSheetUrl();
}
function saveSheetUrl(){
  const url=document.getElementById("sheetUrl").value.trim();
  if(!url.startsWith("https://script.google.com/")){
    alert(tr("alertUrlBad"));
    return;
  }
  localStorage.setItem(SHEET_URL_KEY,url);
  alert(tr("alertUrlOk"));
  document.getElementById("sheetUrlBox").style.display="none";
}

function saveAndExport(){
  const r=currentRecord();
  if(!r.phone){ alert(tr("alertNoPhone")); return; }
  if(r.items.length===0 && r.mode==="alc"){ alert(tr("alertNoItems")); return; }

  const url=getSheetUrl();
  if(!url){
    alert(tr("alertNoUrl"));
    toggleSheetUrlBox();
    return;
  }

  // lưu vào DB cục bộ (để nhận diện khách quen trên máy này)
  const db=loadDB();
  if(!db[r.phone]) db[r.phone]={name:r.name,email:r.email,visits:[]};
  db[r.phone].name=r.name||db[r.phone].name;
  db[r.phone].email=r.email||db[r.phone].email;
  db[r.phone].visits.push({date:r.date,skins:r.skins,note:r.note,mode:r.mode,buffetName:r.buffetName,total:r.total,items:r.items});
  saveDB(db);

  const btn=document.getElementById("btnSaveSheet");
  const oldLabel=btn.innerHTML;
  btn.disabled=true; btn.textContent=tr("savingBtn");

  fetch(url,{
    method:"POST",
    mode:"no-cors", // Apps Script Web App không trả CORS header chuẩn, dùng no-cors để gửi đi
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(r)
  })
  .then(()=>{
    alert(tr("alertSaved")(r.name||r.phone, fmt(r.total)));
  })
  .catch(err=>{
    alert(tr("alertSaveErr")(err));
  })
  .finally(()=>{
    btn.disabled=false; btn.innerHTML=oldLabel;
  });
}
function resetAll(){
  if(!confirm(tr("confirmReset"))) return;
  ["cName","cPhone","cEmail","cNote"].forEach(id=>document.getElementById(id).value="");
  state={mode:"alc",buffet:null,skins:[],selected:new Set(),customerType:"retail"};
  document.getElementById("returningBox").style.display="none";
  document.getElementById("ctypeRetail").classList.add("on");
  document.getElementById("ctypeMember").classList.remove("on");
  setMode("alc"); renderSkins(); renderBill();
}

/* ============ INIT ============ */
document.getElementById("cPhone").addEventListener("input",checkReturning);
document.getElementById("cName").addEventListener("input",renderBill);
setLang("vi");
setMode("alc");
renderBill();
